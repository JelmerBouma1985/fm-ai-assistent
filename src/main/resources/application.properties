spring.application.name=fm-ai-assistent
server.port=8080
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

spring.jpa.show-sql=false

spring.ai.mcp.server.name=fm-ai-assistent
spring.ai.mcp.server.version=${project.version:0.1.0-SNAPSHOT}
spring.ai.mcp.server.protocol=streamable
spring.ai.mcp.server.instructions=Use these tools to inspect FM26 players, clubs, squads, finances and transfer shortlists from the local database. Money values are raw pounds unless a tool field says otherwise.
